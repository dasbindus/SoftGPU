name: Coverage

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          apt-get update && apt-get install -y lcov gcovr cmake build-essential

      - name: CMake configure
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_FLAGS="-coverage -O0 -g"

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Run tests
        run: |
          ctest --test-dir build -j$(nproc) --output-on-failure || true

      - name: Capture coverage
        run: |
          lcov --capture --directory build --output-file coverage.info \
            --exclude '*/tests/*' --exclude '*/extern/*' --exclude '*/_deps/*'

      - name: Generate HTML report
        run: genhtml coverage.info --output-directory coverage_html

      - name: Generate JSON summary
        run: gcovr --json --output coverage.json --filter 'src/.*' .

      - name: Check coverage gate
        run: |
          # P1-5 graded coverage gates (v1.4_DESIGN.md §5.1):
          #   - FragmentShader (src/stages/FragmentShader.*) >= 90% -> HARD gate (blocks CI)
          #   - Interpreter (src/isa/Interpreter.*) >= 95% -> HARD gate (blocks CI)
          #   - Global >= 80% -> SOFT gate (warning only, non-blocking)
          python3 << 'INNER_EOF'
          import json
          import sys
          import fnmatch

          d = json.load(open('coverage.json'))
          files = d.get('files', [])

          # Per-file coverage gates: (basename_glob, min_rate, is_hard_gate)
          FILE_GATES = [
              ('FragmentShader.*', 0.90, True),   # FragmentShader >= 90% HARD
              ('Interpreter.*',     0.95, True),   # Interpreter >= 95% HARD
          ]

          hard_failures = []
          soft_warnings = []

          for f in files:
              path = f.get('path', '')
              basename = path.split('/')[-1]
              lr = f.get('lineCoverageRate', 0)

              for pattern, threshold, is_hard in FILE_GATES:
                  if fnmatch.fnmatch(basename, pattern):
                      status = 'HARD GATE' if is_hard else 'SOFT GATE'
                      msg = (f'::error file={path}::{status}: {basename} '
                             f'line coverage {lr:.1%} < {threshold:.0%} '
                             f'(threshold={threshold:.0%})')
                      if is_hard:
                          hard_failures.append(msg)
                      else:
                          soft_warnings.append(msg)

          # Global soft gate (non-blocking warning)
          global_line = d.get('lineCoverageRate', 0)
          global_branch = d.get('branchCoverageRate', 0)
          print(f'Global line coverage: {global_line:.1%}')
          print(f'Global branch coverage: {global_branch:.1%}')
          if global_line < 0.80:
              soft_warnings.append(f'::warning ::Global line coverage {global_line:.1%} < 80% (soft gate — warning only, non-blocking)')

          # Print soft warnings (non-blocking)
          for w in soft_warnings:
              print(w)

          # Print and fail on hard gate violations
          for err in hard_failures:
              print(err)

          if hard_failures:
              sys.exit(1)
          INNER_EOF


      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-html
          path: coverage_html/
