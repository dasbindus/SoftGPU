name: Build and Test

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  CMAKE_BUILD_TYPE: Release

jobs:
  # ============================================================================
  # Build and Test on Ubuntu (GCC)
  # ============================================================================
  ubuntu:
    name: Ubuntu (GCC)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1-mesa-dev \
            libxkbcommon-dev \
            libglfw3-dev \
            libgtest-dev \
            libgmock-dev

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=${{ env.CMAKE_BUILD_TYPE }} -DCMAKE_CXX_COMPILER=g++

      - name: Build
        run: cmake --build build -j$(nproc) --config Release

      - name: Run test_test_scenarios
        run: ./build/bin/test_test_scenarios

      - name: Run test_Integration
        run: ./build/bin/test_Integration

      - name: Run test_e2e
        run: ./build/bin/test_e2e --gtest_output=xml:./build/test_results_e2e.xml

      - name: Generate GCC golden file if missing
        if: failure()
        run: |
          # Test failed likely due to missing GCC golden file
          # Generate it by running the specific scene and copying
          if [ -f scene009_triangle_cubes100.ppm ]; then
            mkdir -p tests/e2e/golden
            cp scene009_triangle_cubes100.ppm tests/e2e/golden/scene009_triangle_cubes100_gcc.ppm
            echo "Generated GCC golden file"
          fi

      - name: Upload GCC golden file
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gcc-golden-file
          path: tests/e2e/golden/scene009_triangle_cubes100_gcc.ppm
          retention-days: 7

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-ubuntu
          path: |
            build/test_results*.xml
            build/*.ppm
          retention-days: 7

  # ============================================================================
  # Build and Test on macOS (Clang)
  # ============================================================================
  macos:
    name: macOS (Clang)
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew install glfw3 googletest

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=${{ env.CMAKE_BUILD_TYPE }}

      - name: Build
        run: cmake --build build -j$(nproc) --config Release

      - name: Run test_test_scenarios
        run: ./build/bin/test_test_scenarios

      - name: Run test_Integration
        run: ./build/bin/test_Integration

      - name: Run test_e2e
        run: ./build/bin/test_e2e --gtest_output=xml:./build/test_results_e2e.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-macos
          path: |
            build/test_results*.xml
            build/*.ppm
          retention-days: 7

  # ============================================================================
  # Headless render verification (macOS)
  # ============================================================================
  headless-render:
    name: Headless Render (macOS)
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install glfw3

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=${{ env.CMAKE_BUILD_TYPE }}

      - name: Build
        run: cmake --build build -j$(nproc) --config Release

      - name: Run headless Triangle-1Tri
        run: |
          ./build/bin/SoftGPU --headless --scene Triangle-1Tri --output . --output-filename headless_triangle_1tri.ppm
          ls -la *.ppm 2>/dev/null || echo "No PPM generated"

      - name: Run headless Triangle-Cube
        run: |
          ./build/bin/SoftGPU --headless --scene Triangle-Cube --output . --output-filename headless_triangle_cube.ppm
          ls -la *.ppm 2>/dev/null || echo "No PPM generated"

      - name: Run headless Triangle-Cubes-100
        run: |
          ./build/bin/SoftGPU --headless --scene Triangle-Cubes-100 --output . --output-filename headless_triangle_cubes_100.ppm
          ls -la *.ppm 2>/dev/null || echo "No PPM generated"

      - name: Upload PPM outputs
        uses: actions/upload-artifact@v4
        with:
          name: headless-output
          path: "*.ppm"
          retention-days: 7

  # ============================================================================
  # Code quality check
  # ============================================================================
  quality:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for TODOs
        run: |
          echo "=== TODO/FIXME in source ==="
          grep -r "TODO\|FIXME\|XXX\|HACK" src/ --include="*.cpp" --include="*.hpp" | head -20 || echo "No TODOs found"

      - name: Check file sizes
        run: |
          echo "=== Large files (>100KB) ==="
          find src/ -type f \( -name "*.cpp" -o -name "*.hpp" \) -size +100k | head -10
